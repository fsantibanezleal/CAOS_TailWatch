<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailWatch, InSAR Ground-Deformation Monitoring for Tailings Dams & Pit Walls</title>
    <meta name="description" content="A real InSAR deformation studio on synthetic, physics-grounded Sentinel-1 simulations of mine tailings dams and pit walls: SBAS-consistent displacement, velocity maps, inverse-velocity failure forecasting and tiered TARP alarms, client-side. Part of the Faena mining-analytics hub." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Pre-paint theme, same localStorage key as the shared shell.
      (function () {
        try {
          var s = localStorage.getItem('caos.theme');
          document.documentElement.dataset.theme = s ? s : matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
